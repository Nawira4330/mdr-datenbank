<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pferde – MDR Pferdedatenbank</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <h1>🐴 MDR Pferdedatenbank</h1>
    <nav>
      <a class="btn secondary" href="horse.html">+ Neues Pferd</a>
      <button id="logout-btn" class="secondary">Abmelden</button>
    </nav>
  </header>

  <main class="container">
    <form id="filter-form" class="filter-bar">
      <div class="field">
        <label for="f-name">Name</label>
        <input type="text" id="f-name" placeholder="Suche…" />
      </div>
      <div class="field">
        <label for="f-owner">Besitzer</label>
        <select id="f-owner"><option value="">Alle</option></select>
      </div>
      <div class="field">
        <label for="f-color">Farbe</label>
        <input type="text" id="f-color" placeholder="Suche…" />
      </div>
      <div class="field">
        <label for="f-genetik">Genetik enthält</label>
        <input type="text" id="f-genetik" placeholder="z.B. Ch, Z (mehrere mit Komma)" />
      </div>
      <div class="field">
        <label for="f-gp-min">GP von</label>
        <input type="number" id="f-gp-min" />
      </div>
      <div class="field">
        <label for="f-gp-max">GP bis</label>
        <input type="number" id="f-gp-max" />
      </div>
      <div class="field">
        <label for="f-ext-min">Ext von</label>
        <input type="number" id="f-ext-min" step="0.01" />
      </div>
      <div class="field">
        <label for="f-ext-max">Ext bis</label>
        <input type="number" id="f-ext-max" step="0.01" />
      </div>
      <div class="field">
        <label for="f-extpct-min">Ext% von</label>
        <input type="number" id="f-extpct-min" step="0.01" />
      </div>
      <div class="field">
        <label for="f-extpct-max">Ext% bis</label>
        <input type="number" id="f-extpct-max" step="0.01" />
      </div>
      <div class="field">
        <label for="f-int-min">Int von</label>
        <input type="number" id="f-int-min" step="0.01" />
      </div>
      <div class="field">
        <label for="f-int-max">Int bis</label>
        <input type="number" id="f-int-max" step="0.01" />
      </div>
      <div class="field" style="grid-column: span 2;">
        <label for="f-ekh">Erbkrankheiten (Mehrfachauswahl)</label>
        <select id="f-ekh" multiple size="4">
          <option value="__none__">Keine</option>
        </select>
      </div>
      <div class="actions">
        <button type="button" id="reset-filters" class="secondary">Zurücksetzen</button>
        <button type="submit">Filtern</button>
      </div>
    </form>

    <div class="list-header">
      <span id="result-count" class="muted small"></span>
      <div id="bulk-actions" hidden>
        <span id="selected-count" class="muted small"></span>
        <button type="button" id="bulk-delete-btn" class="danger small">Ausgewählte löschen</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="horse-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all" /></th>
            <th data-sort="name">Name</th>
            <th data-sort="gender">Geschlecht</th>
            <th data-sort="coat_color">Farbe</th>
            <th>Farbcode</th>
            <th>GP</th>
            <th>Ext</th>
            <th>Ext%</th>
            <th>Int</th>
            <th>HLP/SLP</th>
            <th>Erbkrankheiten</th>
            <th data-sort="owner">Besitzer</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="13">Lade…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
