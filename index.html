<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Pferde – MDR Pferdedatenbank</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="list-page">
  <header class="topbar">
    <h1>🐴 MDR Pferdedatenbank</h1>
    <nav>
      <span id="session-email" class="muted small"></span>
      <a class="btn secondary" href="horse.html">+ Neues Pferd</a>
      <a class="btn secondary" href="https://nawira4330.github.io/mdr-planer/" target="_blank" rel="noopener">Zucht-/Turnierplaner ↗</a>
      <a class="btn secondary" href="verwaltung.html" id="verwaltung-link" hidden>Verwaltung</a>
      <button id="logout-btn" class="secondary">Abmelden</button>
    </nav>
  </header>

  <main class="container">
    <form id="filter-form" class="filter-bar">
      <div class="filter-group">
        <div class="filter-group-title">Suche</div>
        <div class="filter-group-grid">
          <div class="field">
            <label for="f-name">Name</label>
            <input type="text" id="f-name" placeholder="Suche…" />
          </div>
          <div class="field">
            <label for="f-owner">Besitzer</label>
            <select id="f-owner"><option value="">Alle</option></select>
          </div>
          <div class="field">
            <label for="f-gender">Geschlecht</label>
            <select id="f-gender"><option value="">Alle</option></select>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Genetik &amp; Gesundheit</div>
        <div class="filter-group-grid">
          <div class="field">
            <label>Genetik</label>
            <div class="checkdrop" id="f-genetik-drop">
              <button type="button" class="checkdrop-toggle">Alle</button>
              <div class="checkdrop-panel" hidden></div>
            </div>
          </div>
          <div class="field">
            <label>EKH</label>
            <div class="checkdrop" id="f-ekh-drop">
              <button type="button" class="checkdrop-toggle">Alle</button>
              <div class="checkdrop-panel" hidden></div>
            </div>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Leistungswerte</div>
        <div class="filter-group-grid">
          <div class="field">
            <label for="f-gp-op">GP</label>
            <div class="compare-field">
              <select id="f-gp-op">
                <option value="gt">größer als</option>
                <option value="lt">kleiner als</option>
              </select>
              <input type="number" id="f-gp-val" step="0.01" />
            </div>
          </div>
          <div class="field">
            <label for="f-ext-op">Ext</label>
            <div class="compare-field">
              <select id="f-ext-op">
                <option value="gt">größer als</option>
                <option value="lt">kleiner als</option>
              </select>
              <input type="number" id="f-ext-val" step="0.01" />
            </div>
          </div>
          <div class="field">
            <label for="f-extpct-op">Ext%</label>
            <div class="compare-field">
              <select id="f-extpct-op">
                <option value="gt">größer als</option>
                <option value="lt">kleiner als</option>
              </select>
              <input type="number" id="f-extpct-val" step="0.01" />
            </div>
          </div>
          <div class="field">
            <label for="f-int-op">Int</label>
            <div class="compare-field">
              <select id="f-int-op">
                <option value="gt">größer als</option>
                <option value="lt">kleiner als</option>
              </select>
              <input type="number" id="f-int-val" step="0.01" />
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="reset-filters" class="secondary">Zurücksetzen</button>
        <button type="submit">Filtern</button>
      </div>
    </form>

    <div class="list-header">
      <span id="result-count" class="muted small"></span>
      <label class="mobile-select-all small muted">
        <input type="checkbox" id="select-all-mobile" /> Alle auswählen
      </label>
      <!-- Ersetzt in der mobilen Kartenansicht das Sortieren per Klick auf
           die (dort ausgeblendete) Tabellenkopfzeile. -->
      <div class="mobile-sort">
        <label for="f-sort-field" class="small muted">Sortieren</label>
        <select id="f-sort-field">
          <option value="name">Name</option>
          <option value="gender">Geschlecht</option>
          <option value="coat_color">Farbe</option>
          <option value="gp">GP</option>
          <option value="ext">Ext</option>
          <option value="extpct">Ext%</option>
          <option value="int">Int</option>
          <option value="hlpslp">HLP/SLP</option>
          <option value="owner">Besitzer</option>
        </select>
        <select id="f-sort-dir">
          <option value="asc">aufsteigend</option>
          <option value="desc">absteigend</option>
        </select>
      </div>
      <div id="bulk-actions" hidden>
        <span id="selected-count" class="muted small"></span>
        <button type="button" id="bulk-delete-btn" class="danger small">Ausgewählte löschen</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="horse-table">
        <colgroup>
          <col style="width: 3%" />
          <col style="width: 12%" />
          <col style="width: 7%" />
          <col style="width: 10%" />
          <col style="width: 14%" />
          <col style="width: 5%" />
          <col style="width: 5%" />
          <col style="width: 6%" />
          <col style="width: 5%" />
          <col style="width: 7%" />
          <col style="width: 8%" />
          <col style="width: 9%" />
          <col style="width: 9%" />
        </colgroup>
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all" /></th>
            <th data-sort="name">Name</th>
            <th data-sort="gender">Geschlecht</th>
            <th data-sort="coat_color">Farbe</th>
            <th>Genetik</th>
            <th data-sort="gp">GP</th>
            <th data-sort="ext">Ext</th>
            <th data-sort="extpct">Ext%</th>
            <th data-sort="int">Int</th>
            <th data-sort="hlpslp">HLP/SLP</th>
            <th>EKH</th>
            <th data-sort="owner">Besitzer</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="13">Lade…</td></tr>
        </tbody>
      </table>
    </div>

    <div id="delete-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <h2>Löschen bestätigen</h2>
        <p id="delete-modal-count"></p>
        <ul id="delete-modal-list"></ul>
        <div class="modal-actions">
          <button type="button" id="delete-modal-cancel" class="secondary">Abbrechen</button>
          <button type="button" id="delete-modal-confirm" class="danger">Löschen</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
