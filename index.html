<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Pferde – MDR Pferdedatenbank</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <h1>🐴 MDR Pferdedatenbank</h1>
    <nav>
      <span id="session-email" class="muted small"></span>
      <a class="btn secondary" href="horse.html">+ Neues Pferd</a>
      <a class="btn secondary" href="verwaltung.html" id="verwaltung-link" hidden>Verwaltung</a>
      <button id="logout-btn" class="secondary">Abmelden</button>
    </nav>
  </header>

  <main class="container">
    <form id="filter-form" class="filter-bar">
      <div class="field">
        <label for="f-name">Name</label>
        <input type="text" id="f-name" placeholder="Suche…" />
      </div>
      <div class="field">
        <label for="f-owner">Besitzer</label>
        <select id="f-owner"><option value="">Alle</option></select>
      </div>
      <div class="field">
        <label>Genetik</label>
        <div class="checkdrop" id="f-genetik-drop">
          <button type="button" class="checkdrop-toggle">Alle</button>
          <div class="checkdrop-panel" hidden></div>
        </div>
      </div>
      <div class="field">
        <label>EKH</label>
        <div class="checkdrop" id="f-ekh-drop">
          <button type="button" class="checkdrop-toggle">Alle</button>
          <div class="checkdrop-panel" hidden></div>
        </div>
      </div>
      <div class="field">
        <label for="f-gp-op">GP</label>
        <div class="compare-field">
          <select id="f-gp-op">
            <option value="gt">größer als</option>
            <option value="lt">kleiner als</option>
          </select>
          <input type="number" id="f-gp-val" step="0.01" />
        </div>
      </div>
      <div class="field">
        <label for="f-ext-op">Ext</label>
        <div class="compare-field">
          <select id="f-ext-op">
            <option value="gt">größer als</option>
            <option value="lt">kleiner als</option>
          </select>
          <input type="number" id="f-ext-val" step="0.01" />
        </div>
      </div>
      <div class="field">
        <label for="f-extpct-op">Ext%</label>
        <div class="compare-field">
          <select id="f-extpct-op">
            <option value="gt">größer als</option>
            <option value="lt">kleiner als</option>
          </select>
          <input type="number" id="f-extpct-val" step="0.01" />
        </div>
      </div>
      <div class="field">
        <label for="f-int-op">Int</label>
        <div class="compare-field">
          <select id="f-int-op">
            <option value="gt">größer als</option>
            <option value="lt">kleiner als</option>
          </select>
          <input type="number" id="f-int-val" step="0.01" />
        </div>
      </div>
      <div class="actions">
        <button type="button" id="reset-filters" class="secondary">Zurücksetzen</button>
        <button type="submit">Filtern</button>
      </div>
    </form>

    <div class="list-header">
      <span id="result-count" class="muted small"></span>
      <div id="bulk-actions" hidden>
        <span id="selected-count" class="muted small"></span>
        <button type="button" id="bulk-delete-btn" class="danger small">Ausgewählte löschen</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="horse-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all" /></th>
            <th data-sort="name">Name</th>
            <th data-sort="gender">Geschlecht</th>
            <th data-sort="coat_color">Farbe</th>
            <th>Genetik</th>
            <th data-sort="gp">GP</th>
            <th data-sort="ext">Ext</th>
            <th data-sort="extpct">Ext%</th>
            <th data-sort="int">Int</th>
            <th data-sort="hlpslp">HLP/SLP</th>
            <th>EKH</th>
            <th data-sort="owner">Besitzer</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="13">Lade…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
